const RE=[{"id": "R_jean_bouf", "name": "Jean Bouffard", "born": "c. 1615", "died": "c. 1680", "children": [], "star": false, "note": "Bourgeois of Rouen, born at the parish of St-Cande-le-Vieux (c. 1613-1615). Married Marguerite Leportier on 23 February 1639 at St-Martin-du-Pont, Rouen. The marriage record is NON-FILIATIF — neither spouse\'s parents were named. This means Jean\'s parents remain unknown and cannot be traced further without original parish register research at the Archives departementales de Seine-Maritime (AD-76). Jean and Marguerite had 11 known children, ALL baptized at St-Martin-du-Pont: Marguerite and Martin (27 Nov 1639), Jean (10 Nov 1640, buried 12 Nov 1640), Francois (4 Feb 1642, buried 8 Feb 1642), Francois (26 Nov 1642), Nicolas (29 Nov 1643), Jean (18 Jun 1650), Catherine (11 Dec 1651), Anne (8 Jun 1653), Jacques (17 Nov 1654), and Elizabeth (m. 25 Nov 1695 at St-Vincent, Rouen, to Charles Bully). NOTE: Some FamilySearch trees incorrectly show a first wife \'Marie Laferriere\' — this is confusion with Marguerite Leportier who was cited as \'Laferriere\' in the 1680 marriage contract. Y-DNA haplogroup for the Bouffard line: R1a-Z287.", "place": "Rouen (St-Candé-le-Vieux), Normandy, France", "links": [{"t": "Fichier Origine — Bouffard", "u": "https://www.fichierorigine.com/fr/repertoire/bouffard"}, {"t": "WikiTree: Bouffard-2", "u": "https://www.wikitree.com/wiki/Bouffard-2"}, {"t": "Francogene Regional Index", "u": "https://www.francogene.com/genealogie-quebec-genealogy/places/2076.php"}]}, {"id": "R_marg_lep", "name": "Marguerite Leportier", "born": "c. 1615", "died": "c. 1680", "children": [], "star": false, "note": "Born at St-Martin-du-Pont, Rouen, c. 1615-1620. Also known as \'Laferriere\' (as cited in 1680 marriage contract of her son Jacques). Wife of Jean Bouffard. Marriage record is non-filiatif — her parents are unknown. Some Filae family trees list children under the spelling \'BOUFFART\': Jacques, Nicolas, Francois, Marguerite, Martin. She and Jean had at least 11 children.", "place": "Rouen (St-Martin-du-Pont), Normandy, France", "links": [{"t": "WikiTree: Leportier-1", "u": "https://www.wikitree.com/wiki/Leportier-1"}, {"t": "Geni.com profile", "u": "https://www.geni.com/people/Marguerite-Le-Portier/6000000001355514463"}]}, {"id": "R_anne_lecl", "name": "Anne Leclerc", "born": "17 Sep 1664", "died": "8 Dec 1699", "children": [], "star": false, "note": "Baptized 17 September 1664 at Château-Richer, Nouvelle-France. Daughter of Jean Leclerc dit Le Bouteleux (linen weaver from Dieppe) and Marie Blanquet. When Anne married Jacques Bouffard on 5 March 1680 at St-Pierre, Île d'Orléans, her father was noted as 'à présent absent en France' — he had returned to France c. 1679 and never came back. Anne and Jacques had 10 children in 19 years. She died at just 35 years old on 8 December 1699 at St-Laurent, Île d'Orléans.", "place": "Château-Richer → Île d'Orléans, Nouvelle-France", "links": [{"t": "WikiTree: Leclerc-14", "u": "https://www.wikitree.com/wiki/Leclerc-14"}]}, {"id": "R_j_leclerc", "name": "Jean Leclerc dit Le Bouteleux", "born": "24 Aug 1635", "died": "c. 1680 (France)", "children": [], "star": false, "note": "Baptized 24 August 1635 at St-Rémy, Dieppe, Normandy. Son of Jean Leclerc (the elder) and Perrette Brunet. Married Marie Blanquet on 31 December 1657 in Dieppe. Occupation: tisserand en toile (linen weaver), later maître bottier (master boot-maker). Emigrated to New France c. 1659/1660 with wife, infant son Pierre, and father-in-law Adrien Blanquet. Received land on Île d'Orléans on 10 August 1662 from the Juchereau brothers. The 1666 census lists him with his family. Around 1679–1680, Jean mysteriously returned to France. His daughter Anne's 1680 marriage contract states he was 'absent in France.' By the 1681 census, his wife Marie was listed as a widow. He likely died in France or at sea.", "place": "Dieppe, France → Île d'Orléans → returned to France", "links": [{"t": "French-Canadian Genealogist", "u": "https://www.tfcg.ca/jeanleclerc-and-marieblanquet"}, {"t": "WikiTree: Leclerc-48", "u": "https://www.wikitree.com/wiki/Leclerc-48"}]}, {"id": "R_m_blanq", "name": "Marie Blanquet", "born": "31 Aug 1631", "died": "10 Sep 1709", "children": [], "star": false, "note": "Baptized 31 August 1631 at St-Vaast, Ocqueville, near Dieppe, Normandy. Her father was Adrien Blanquet dit Lafougère (saddler) and her mother was Catherine Prévost, who died just 20 days after Marie's birth — possibly from childbirth complications. Marie was an only child. She married Jean Leclerc c. 1657 in Dieppe. They emigrated to New France c. 1660 with her father Adrien. After Jean disappeared to France c. 1679 and was presumed dead by 1681, Marie remained a widow for nearly 30 years, managing the family farm alone. The 1681 census shows her at age 50 with five children, one gun, 13 head of cattle, and 20 arpents of cultivated land. She died 10 September 1709 at St-Pierre, Île d'Orléans, age 78.", "place": "Ocqueville, France → Île d'Orléans, Nouvelle-France", "links": [{"t": "Find a Grave", "u": "https://www.findagrave.com/memorial/113832229"}, {"t": "Fichier Origine — Blanquet", "u": "https://www.fichierorigine.com/fr/repertoire/blanquet"}]}, {"id": "R_adr_blanq", "name": "Adrien Blanquet dit Lafougère", "born": "c. 1604", "died": "bef. Aug 1684", "children": [], "star": false, "note": "Born c. 1604 in St-Pierre-de-Bacqueville-en-Caux, near Dieppe. Son of André Blanquet (baptized 1576 at Ocqueville) and Perette Caperon. First married Catherine Prévost on 25 November 1625 at Ocqueville — Catherine died 20 September 1631. Arrived in New France by 1658 (land grant dated 29 July 1658). Remarried 7 November 1663 at Québec to Anne Lemaître, a Fille du Roi widow. The 1666 census lists him as a sellier (saddler), age 62, on Île d'Orléans. No children with second wife. Died before August 1684.", "place": "Bacqueville, Normandy → Île d'Orléans", "links": [{"t": "WikiTree: Blanquet-5", "u": "https://www.wikitree.com/wiki/Blanquet-5"}, {"t": "Fichier Origine — Blanquet", "u": "https://www.fichierorigine.com/fr/repertoire/blanquet"}]}, {"id": "R_andre_bl", "name": "André (Andrieu) Blanquet", "born": "b. 7 Jan 1576", "died": "", "children": [], "star": false, "note": "Baptized 7 January 1576 at Ocqueville (St-Vaast), Seine-Maritime, Normandy. Married Perette Caperon. Father of Adrien Blanquet dit Lafougère. This is the oldest confirmed ancestor on the Blanquet line.", "place": "Ocqueville (St-Vaast), Normandy, France", "links": [{"t": "Fichier Origine — Blanquet", "u": "https://www.fichierorigine.com/fr/repertoire/blanquet"}]}, {"id": "R_ma_fourn", "name": "Marie-Anne Fournier", "born": "30 Mar 1707", "died": "c. 15 Jul 1781", "children": [], "star": false, "note": "Born 30 March 1707 in Montmagny. Daughter of Simon Fournier and Anne-Catherine Rousseau. First married François Bouffard c. 1726/1727 — they had approximately 12 children. After François died in 1746, she remarried 26 February 1748 to Alexis Couture at St-Laurent, Île d'Orléans. Died c. 15 July 1781.", "place": "Montmagny → Île d'Orléans", "links": [{"t": "WikiTree: Fournier-815", "u": "https://www.wikitree.com/wiki/Fournier-815"}]}, {"id": "R_sim_four", "name": "Simon Fournier", "born": "27 Apr 1667", "died": "bef. Dec 1749", "children": [], "star": false, "note": "Born 27 April 1667 in Montmagny. Son of the pioneer Guillaume Fournier and Françoise Hébert (granddaughter of Louis Hébert). Married Anne-Catherine Rousseau on 12 November 1691 at St-Pierre, Île d'Orléans. Had 11 known children. Received a land concession from the Couillard seigneurs in 1716. Died before December 1749.", "place": "Montmagny / St-Pierre-de-la-Rivière-du-Sud", "links": [{"t": "Find a Grave", "u": "https://www.findagrave.com/memorial/123771273"}]}, {"id": "R_ac_rouss", "name": "Anne-Catherine Rousseau", "born": "c. 1668", "died": "8 Dec 1749", "children": [], "star": false, "note": "Daughter of Thomas Rousseau (pioneer from Poitou) and Madeleine Olivier (a Fille du Roi from Normandy who arrived in 1667). Married Simon Fournier on 12 November 1691. Had 11 children. Buried 8 December 1749 at St-Pierre-de-la-Rivière-du-Sud.", "place": "Île d'Orléans → St-Pierre-de-la-Rivière-du-Sud"}, {"id": "R_guil_four", "name": "Guillaume Fournier", "born": "c. 1619", "died": "24 Oct 1699", "children": [], "star": true, "note": "★ PIONEER & SEIGNEUR. Born c. 1619 in Coulmer (St-Martin), dept. Orne, Normandy. Son of Gilles Fournier and Noëlle Gageut. Arrived in New France c. 1651. On 20 November 1651, at Notre-Dame de Québec, he married 13-year-old Françoise Hébert, granddaughter of Louis Hébert. He was illiterate — could not sign his name — but extremely ambitious and combative. He filed over 100 complaints with the Provost and Council over 30 years. Through his marriage to Françoise, he became seigneur of lands originally granted to Louis Hébert. He later received the 'Fief St-Joseph' (Fief Fournier) at Montmagny from Intendant Jean Talon — 30 arpents by 2 leagues deep. He founded the parish of St-Thomas-de-la-Pointe-à-la-Caille (Montmagny). Had 14–15 children. Died 24 October 1699 at age ~80.", "place": "Coulmer, Normandy → Québec → Montmagny", "links": [{"t": "Association des Fournier d'Amérique", "u": "https://association-fournier.com/guillaume-fournier/"}, {"t": "Ancestor Biographies", "u": "https://ancestorbios.blogspot.com/2017/12/a-seigneur-in-early-quebec-guillaume.html"}]}, {"id": "R_gilles_f", "name": "Gilles Fournier", "born": "c. 1595", "died": "aft. 1651", "children": [], "star": false, "note": "Born c. 1595 in Coulmer, dept. Orne, Normandy. Married Noëlle Gageut (also recorded as Gagnon). Their son Guillaume emigrated to New France c. 1651. Named in Guillaume's marriage record at Notre-Dame de Québec.", "place": "Coulmer, Orne, Normandy, France"}, {"id": "R_fran_heb", "name": "Françoise Hébert", "born": "23 Jan 1638", "died": "16 Mar 1716", "children": [], "star": true, "note": "★ Born 23 January 1638 at Québec — one of the first European children born in New France. Granddaughter of Louis Hébert, the first farmer of Canada. Her father Guillaume Hébert was killed c. 1639 when she was only one year old. Raised by her aunt Guillemette Hébert. At just 13 years old, she married Guillaume Fournier on 20 November 1651. Through her inheritance from Louis Hébert, she brought substantial land holdings to the marriage, making Guillaume a seigneur. They had 14–15 children. After Guillaume's death in 1699, Françoise was elected 'sage-femme' (midwife) by the women of the Montmagny parish on 20 November 1703. She died 16 March 1716 at age 78.", "place": "Québec → Montmagny", "links": [{"t": "Association des Fournier", "u": "https://association-fournier.com/guillaume-fournier/"}]}, {"id": "R_guil_heb", "name": "Guillaume Hébert", "born": "c. 1614", "died": "23 Sep 1639", "children": [], "star": false, "note": "Born c. 1614 in Paris. Son of Louis Hébert and Marie Rollet. At just 3 years old, Guillaume sailed with his parents and sisters aboard the Saint-Étienne from Honfleur to Québec in 1617, accompanying Samuel de Champlain. He helped his father clear and farm the first cultivated land in Canada. On 1 October 1634, he married Hélène Desportes (the first child of French parents born in New France). They had three children: Joseph, Françoise (1638), and Angélique. Tragically, Guillaume died on 23 September 1639, at only ~25 years old. Some accounts suggest he was killed by the Iroquois; others attribute his death to smallpox.", "place": "Paris → Québec, Nouvelle-France", "links": [{"t": "WikiTree: Hebert-1312", "u": "https://www.wikitree.com/wiki/Hebert-1312"}]}, {"id": "R_hel_desp", "name": "Hélène Desportes", "born": "c. 1620", "died": "c. 1675", "children": [], "star": true, "note": "★ FIRST CHILD OF FRENCH PARENTS BORN IN NEW FRANCE. Born c. 1620 in Québec to Pierre Desportes and Françoise Langlois. At 14, she married Guillaume Hébert (son of Louis Hébert and Marie Rollet) on 1 October 1634. They had three children before Guillaume's death in 1639. Hélène remarried c. 1640 to Noël Morin, with whom she had 12 more children. She died c. 1675.", "place": "Québec, Nouvelle-France", "links": [{"t": "Dict. Canadian Biography", "u": "https://www.biographi.ca/en/bio/desportes_helene_1E.html"}, {"t": "Wikipedia", "u": "https://en.wikipedia.org/wiki/H%C3%A9l%C3%A8ne_Desportes"}]}, {"id": "R_louis_he", "name": "Louis Hébert", "born": "c. 1575", "died": "25 Jan 1627", "children": [], "star": true, "note": "★★ FIRST FARMER OF CANADA. Born c. 1575 at 129 rue Saint-Honoré, Paris. Son of Nicolas Hébert (apothecary to Queen Catherine de Médicis) and Jacqueline Pajot. Married Marie Rollet on 19 February 1601 at St-Sulpice, Paris. First visited New World in 1606 with Champlain to Port-Royal, Acadia. In 1617, Champlain recruited him to settle permanently in Québec. Despite the trading company slashing his promised salary from 600 to 300 livres, Louis sailed on 11 March 1617 aboard the Saint-Étienne with his wife, three children, and brother-in-law Claude Rollet. He received the first private land grant in New France — 10 arpents on what is now the Seminary of Québec and Basilica of Notre-Dame. With only an axe, pick and spade, he planted corn, wheat, beans, peas, apple orchard and vineyard. He also served as the colony's physician and King's attorney. Died 25 January 1627 after falling on ice. Statues of Louis, Marie, and their children stand in Parc Montmorency, Québec City. Canada Post stamp issued 1985.", "place": "Paris (129 rue Saint-Honoré) → Québec, Nouvelle-France", "links": [{"t": "Dictionary of Canadian Biography", "u": "https://www.biographi.ca/en/bio/hebert_louis_1E.html"}, {"t": "Canadian Encyclopedia", "u": "https://www.thecanadianencyclopedia.ca/en/article/louis-hebert"}, {"t": "WikiTree: Hebert-1312", "u": "https://www.wikitree.com/wiki/Hebert-1312"}, {"t": "Wikipedia", "u": "https://en.wikipedia.org/wiki/Louis_H%C3%A9bert"}], "web_img": {"url": "https://upload.wikimedia.org/wikipedia/commons/7/77/Louis_H%C3%A9bert_the_Apothecary.jpg", "cap": "Louis Hébert, apothicaire — peinture de C.W. Jefferys (domaine public)", "credit": "C.W. Jefferys, Public Domain, via Wikimedia Commons"}}, {"id": "R_marie_ro", "name": "Marie Rollet", "born": "c. 1580", "died": "May 1649", "children": [], "star": true, "note": "★★ 'THE MOTHER OF NEW FRANCE'. Born c. 1580 in Paris (Saint-Germain-des-Prés, 6th arrondissement). Father: Jean Rollet (gunner/canonnier for King Henry IV). Mother: Anne Cogu. Educated at a convent — could read and write, rare for women then. First married François Dufeu (merchant, deceased before 1601). Married Louis Hébert on 19 February 1601 at St-Sulpice, Paris. In 1606, sold family house on rue de Petite Seine to Queen Marguerite, Duchess of Valois, for 2,160 livres. Sailed to Québec in 1617 aboard the Saint-Étienne — first European woman to settle permanently in New France. First schoolteacher in Canada — taught French and Indigenous children. After Louis died 1627, married Guillaume Hubou in 1629. When the Kirke brothers seized Québec for England, Marie chose to stay — one of the only colonists to remain. After French rule restored, she sheltered orphans and young Indigenous girls. By 1800, ~4,592 direct descendants. Buried 27 May 1649 in Québec, age ~69.", "place": "Paris → Québec, Nouvelle-France", "links": [{"t": "Canadian Encyclopedia", "u": "https://www.thecanadianencyclopedia.ca/en/article/marie-rollet"}, {"t": "WikiTree: Rolet-38", "u": "https://www.wikitree.com/wiki/Rolet-38"}, {"t": "Find a Grave", "u": "https://www.findagrave.com/memorial/113832229/marie-rollet"}], "web_img": {"url": "https://upload.wikimedia.org/wikipedia/commons/f/f6/Louis_Hebert_semant.jpg", "cap": "Louis Hébert semant le blé — illustration de 1913 (domaine public). Marie Rollet travaillait à ses côtés.", "credit": "A.C. Després, 1913, Public Domain, via Wikimedia Commons"}}, {"id": "R_nic_heb", "name": "Nicolas Hébert", "born": "c. 1545", "died": "c. 1600", "children": [], "star": false, "note": "Apothecary who served in the household of Queen Catherine de Médicis of France. His practice was at 129 rue Saint-Honoré, Paris (near the Palais Royal du Louvre). Married Jacqueline Pajot, daughter of Simon Pajot (master tallow chandler) and Jeanne Guérineau. Jacqueline had been married twice before. She died c. 1579–1580 when their son Louis was still very young. Nicolas had at least four children: Charlotte, Jacques, Louis (the future pioneer), and Marie.", "place": "Paris, France (129 rue Saint-Honoré)"}, {"id": "R_sim_paj", "name": "Simon Pajot", "born": "c. 1520s", "died": "", "children": [], "star": false, "note": "OLDEST DOCUMENTED ANCESTOR on the Hébert maternal line. Master tallow chandler (maître chandelier de suif) and bourgeois of Paris. Married Jeanne Guérineau. Their daughter Jacqueline Pajot married Nicolas Hébert (apothecary to Queen Catherine de Médicis), making Simon the great-great-grandfather of Françoise Hébert who married into the Fournier line.", "place": "Paris, France"}, {"id": "R_tho_rous", "name": "Thomas Rousseau", "born": "c. 1632", "died": "c. 1715–1716", "children": [], "star": false, "note": "Born c. 1632 in Oroux (parish of Gourgé), diocese of Poitiers, Poitou, France. Son of Honoré Rousseau and Marie Boillerot. Arrived in New France 1663. Confirmed at Québec 22 March 1664. Established himself on Île d'Orléans — by 1668 farming 3 arpents frontage. Married Madeleine Olivier (a Fille du Roi) on 5 October 1667 at Notre-Dame de Québec, just 10 days after her arrival. Had 8 children with Madeleine. After her death 1690, remarried Charlotte-Françoise Bélanger in 1691. The 1681 census records him with 15 arpents, a gun, and 4 cattle. His will prepared 11 October 1707. Listed as 'defunct' by July 1715.", "place": "Oroux, Poitou, France → Île d'Orléans", "links": [{"t": "WikiTree: Rousseau-47", "u": "https://www.wikitree.com/wiki/Rousseau-47"}, {"t": "Find a Grave", "u": "https://www.findagrave.com/memorial/123772478/thomas-rousseau"}]}, {"id": "R_mad_oliv", "name": "Madeleine Olivier", "born": "c. 1637", "died": "21 Apr 1690", "children": [], "star": true, "note": "★ FILLE DU ROI. Born c. 1637 in Caudebec-en-Caux, archdiocese of Rouen, Normandy. Daughter of the late Jean Olivier and Louise Prévost (both deceased before departure). Arrived in New France on 25 September 1667 aboard the ship St-Louis from Dieppe, as one of the ~800 Filles du Roi — young women sent by King Louis XIV to help populate the colony. She could not sign her name. Just 10 days after arrival, on 5 October 1667, she married Thomas Rousseau at Notre-Dame de Québec. They settled on Île d'Orléans and had 8 children. She died 20 April 1690, buried the next day at St-Laurent, Île d'Orléans.", "place": "Caudebec-en-Caux, Normandy → Île d'Orléans", "links": [{"t": "WikiTree: Olivier-12", "u": "https://www.wikitree.com/wiki/Olivier-12"}, {"t": "Fichier Origine — Olivier", "u": "https://www.fichierorigine.com/fr/repertoire/olivier"}]}, {"id": "R_hon_rous", "name": "Honoré Rousseau", "born": "c. 1606", "died": "bef. 1667", "children": [], "star": false, "note": "Lived in the parish of Gourgé (cited as 'Gorgé'), diocese of Poitiers, Poitou, France. Married Marie Boillerot (also spelled Billerot). Both deceased by the time their son Thomas married in 1667 — his marriage contract refers to 'feu Honoré Rousseau et feue Marie Billerot' (the late Honoré and the late Marie).", "place": "Gourgé, Poitou, France"}, {"id": "R_jean_rol", "name": "Jean Rollet", "born": "c. 1550s", "died": "", "children": [], "star": false, "note": "Gunner (canonnier) for King Henry IV of France. Lived in the neighbourhood of Saint-Germain-des-Prés in the 6th arrondissement of Paris. Married Anne Cogu. They were described as financially well off. In 1606, Anne was still living on the rue Haute-Feuille near the medical school. Their daughter Marie Rollet became 'The Mother of New France.'", "place": "Paris (Saint-Germain-des-Prés), France"}, {"id": "R_p_desp", "name": "Pierre Desportes", "born": "c. 1580", "died": "c. 1629–1634", "children": [], "star": false, "note": "One of the earliest settlers of Québec. Originally from the diocese of Lisieux, Normandy. Literate and educated — he composed the 1621 petition to King Louis XIII on behalf of the colonists. Married Françoise Langlois (sister of Marguerite Langlois, who married Abraham Martin). They arrived in Québec c. 1619–1620. Pierre was in charge of the warehouse and served as village baker. Their daughter Hélène, born 1620, was the first child of French parents born in New France. Her godmother was Hélène Boullé, wife of Samuel de Champlain. By 1800, Pierre and Françoise had 6,515 direct descendants.", "place": "Lisieux, Normandy → Québec, Nouvelle-France", "links": [{"t": "Dict. Canadian Biography", "u": "https://www.biographi.ca/en/bio/desportes_helene_1E.html"}, {"t": "Find a Grave", "u": "https://www.findagrave.com/memorial/137366176/pierre-desportes"}, {"t": "Wikipedia", "u": "https://en.wikipedia.org/wiki/H%C3%A9l%C3%A8ne_Desportes"}]}, {"id": "R_f_langl", "name": "Françoise Langlois", "born": "c. 1599", "died": "20 Apr 1632", "children": [], "star": true, "note": "★ FIRST EUROPEAN MOTHER IN CANADA. Born c. 1599, possibly daughter of Guillaume Langlois and Jeanne Millette from Calvados, Normandy (unconfirmed). Sister of Marguerite Langlois (who married Abraham Martin — the man the Plains of Abraham are named after). Married Pierre Desportes c. 1617–1618. They sailed to Québec c. 1619–1620 with her sister and brother-in-law. In 1620, Françoise gave birth to Hélène Desportes — the first child of French parents born in New France. After the English captured Québec in 1629, the family was deported. Françoise died in Dieppe, France on 20 April 1632 and was buried at the church of Saint-Jacques.", "place": "Normandy → Québec → died in Dieppe, France", "links": [{"t": "WikiTree: Langlois-95", "u": "https://www.wikitree.com/wiki/Langlois-95"}, {"t": "Ancestor Biographies", "u": "http://ancestorbios.blogspot.com/2012/02/first-european-mother-in-canada.html"}]}, {"id": "R_abr_mart", "name": "Abraham Martin dit L'Écossais", "born": "c. 1589", "died": "8 Sep 1664", "children": [], "star": true, "note": "★ THE PLAINS OF ABRAHAM ARE NAMED AFTER HIM. Born c. 1589, probably in France (possibly Dieppe). Called 'dit L'Écossais' (the Scotsman). Married Marguerite Langlois — sister of Françoise Langlois (mother of Hélène Desportes). Arrived in Québec c. 1620 with his wife, her sister Françoise and brother-in-law Pierre Desportes. Royal pilot on the St. Lawrence River. Received land grants from Champlain on the heights above Québec — this land later became known as the 'Plains of Abraham' where the famous 1759 battle took place. Champlain left 600 livres to Abraham in his will. He and Marguerite had 9–10 children. Famous descendants include Madonna, Céline Dion, Justin Trudeau, Jim Carrey, and Angelina Jolie. Abraham Martin is an UNCLE BY MARRIAGE to Hélène Desportes (through the Langlois sisters).", "place": "France → Québec, Nouvelle-France", "links": [{"t": "Dict. Canadian Biography", "u": "https://www.biographi.ca/en/bio/martin_abraham_1E.html"}, {"t": "Plains of Abraham official site", "u": "https://www.plainsofabraham.ca/history-and-heritage/history-of-the-park/before-1759-precolonial-period-and-new-france/abraham-martin-the-scot"}, {"t": "The French-Canadian Genealogist", "u": "https://www.tfcg.ca/abraham-martin-ecossais-en"}], "web_img": {"url": "https://upload.wikimedia.org/wikipedia/commons/1/10/Plaines_d%27Abraham.jpg", "cap": "Les Plaines d'Abraham, Québec — nommées d'après Abraham Martin dit l'Écossais", "credit": "Wikimedia Commons, CC BY-SA"}}, {"id": "R_m_langl", "name": "Marguerite Langlois", "born": "c. 1602", "died": "17 Dec 1665", "children": [], "star": false, "note": "Wife of Abraham Martin dit L'Écossais. Sister of Françoise Langlois (mother of Hélène Desportes). Marguerite was a midwife in the Québec colony. Arrived c. 1620 with her husband, sister and brother-in-law. Samuel de Champlain left gifts to her and her daughter in his will. After Abraham's death in 1664, she briefly married young settler René Branche from Poitou. She died 17 December 1665. Their property was sold to the Ursulines and included the land that became the Plains of Abraham.", "place": "Normandy → Québec, Nouvelle-France", "links": [{"t": "The French-Canadian Genealogist", "u": "https://www.tfcg.ca/abraham-martin-ecossais-en"}]}, {"id": "R_noel_mor", "name": "Noël Morin", "born": "c. 1616", "died": "1680", "children": [], "star": false, "note": "Second husband of Hélène Desportes. Born in the parish of St-Étienne in Brie-Comte-Robert, near Paris. Wheelwright by trade. Married Hélène on 9 January 1640 at Notre-Dame de Québec (after Guillaume Hébert's death). They had 12 children together. Their son Germain Morin became the first Canadian-born priest, consecrated by Mgr François de Laval in 1665. Noël became a pioneer of Montmagny.", "place": "Brie-Comte-Robert, France → Québec → Montmagny", "links": [{"t": "Dict. Canadian Biography (Hélène)", "u": "https://www.biographi.ca/en/bio/desportes_helene_1E.html"}]}];

  d.style.cssText="left:"+p.x+"px;top:"+p.y+"px;width:"+NW+"px;height:"+NH+"px;padding:3px 5px;";
  if(isR)d.style.borderLeftColor="var(--go)";else if(dp.has(id))d.style.borderLeftColor="var(--tl)";
  var st=n.star?"<span class=st>\u2605</span>":"";
  var rb=isR?"<span class=rb>R</span>":"";
  d.innerHTML="<div class=nm>"+st+(n.name||"")+rb+"</div><div class=dt>"+(n.born||"")+(n.died?" \u2013 "+n.died:"")+"</div>";
  d.setAttribute("data-id",id);
  d.onmousedown=function(ev){ev.stopPropagation()};
  d.onclick=function(ev){ev.stopPropagation();showP(id)};
  world.appendChild(d);
});
var spouseMap={"R_louis_he":"R_marie_ro","R_marie_ro":"R_louis_he","R_guil_heb":"R_hel_desp","R_hel_desp":"R_guil_heb","R_fran_heb":"R_guil_four","R_guil_four":"R_fran_heb","R_sim_four":"R_ac_rouss","R_ac_rouss":"R_sim_four","R_tho_rous":"R_mad_oliv","R_mad_oliv":"R_tho_rous","R_jean_bouf":"R_marg_lep","R_marg_lep":"R_jean_bouf","R_p_desp":"R_f_langl","R_f_langl":"R_p_desp","R_abr_mart":"R_m_langl","R_m_langl":"R_abr_mart","R_hel_desp":"R_noel_mor","R_noel_mor":"R_hel_desp"};
var rtree={"R_sim_paj":["R_nic_heb"],"R_nic_heb":["R_louis_he"],"R_louis_he":["R_guil_heb"],"R_guil_heb":["R_fran_heb"],"R_fran_heb":["R_sim_four"],"R_sim_four":["R_ma_fourn"],"R_andre_bl":["R_adr_blanq"],"R_adr_blanq":["R_m_blanq"],"R_m_blanq":["R_anne_lecl"],"R_j_leclerc":["R_anne_lecl"],"R_jean_rol":["R_marie_ro"],"R_gilles_f":["R_guil_four"],"R_hon_rous":["R_tho_rous"],"R_tho_rous":["R_ac_rouss"],"R_p_desp":["R_hel_desp"],"R_f_langl":["R_hel_desp"]};
function showP(id){
  var n=byId[id];if(!n)return;
  document.querySelectorAll(".n").forEach(function(d){d.classList.remove("sel")});
  var el=document.querySelector(".n[data-id=\""+id+"\"]");if(el)el.classList.add("sel");
  // Highlight connected edges
  document.querySelectorAll(".edge").forEach(function(e){
    var f=e.getAttribute("data-from"),t=e.getAttribute("data-to");
    if(f===id||t===id){e.setAttribute("stroke","#FFD700");e.setAttribute("stroke-width","2.5");e.setAttribute("opacity","1");e.classList.add("hi")}
    else{e.setAttribute("stroke",e.getAttribute("data-os"));e.setAttribute("stroke-width",e.getAttribute("data-ow"));e.setAttribute("opacity","0.08");e.classList.remove("hi")}
  });
  var star=n.star?"<span style=\'color:var(--go);font-size:1.1rem\'>\u2605</span> ":"";
  var h="<h2>"+star+(n.name||"")+"</h2>";
  h+="<div class=life>"+(n.born||"")+(n.died?" \u2014 "+n.died:"")+"</div>";
  if(n.place)h+="<div class=pl>\ud83d\udccd "+n.place+"</div>";
  if(n.note)h+="<div class=nt>"+n.note+"</div>";
  if(n.img)h+='<div style="margin:12px 0"><div class=sec>Document original</div><img src="'+n.img.src+'" style="width:100%;border-radius:6px;border:1px solid #444;cursor:pointer" onclick="window.open(this.src)" title="Cliquer pour agrandir"><div style="color:#b8a070;font-size:11px;margin-top:4px;font-style:italic">'+n.img.cap+'</div></div>';
  if(n.web_img)h+='<div style="margin:12px 0"><div class=sec>Image historique</div><img src="'+n.web_img.url+'" style="width:100%;border-radius:6px;border:1px solid #444;max-height:300px;object-fit:contain;background:#1a1a1a" onerror="this.parentNode.style.display=\'none\'"><div style="color:#b8a070;font-size:11px;margin-top:4px;font-style:italic">'+n.web_img.cap+'</div><div style="color:#666;font-size:9px;margin-top:2px">'+n.web_img.credit+'</div></div>';
  var kids=(n.children||[]).filter(function(c){return byId[c]&&pos[c]});
  if(kids.length){h+="<div class=sec>Children ("+kids.length+")</div>";kids.forEach(function(c){var cn=byId[c];h+="<span class=lnk onclick=\"goR(\'"+c+"\');showP(\'"+c+"\')\">"+(cn?cn.name:c)+"</span>"})}
  var pars=[];
  EX.concat(RE).forEach(function(p){if((p.children||[]).indexOf(id)>=0)pars.push(p.id)});
  Object.keys(rtree).forEach(function(k){if(rtree[k].indexOf(id)>=0&&pars.indexOf(k)<0)pars.push(k)});
  if(pars.length){h+="<div class=sec>Parents</div>";pars.forEach(function(pid){var p=byId[pid];if(p)h+="<span class=lnk onclick=\"goR(\'"+pid+"\');showP(\'"+pid+"\')\">"+(p.name||"")+"</span>"})}
  if(spouseMap[id]){var sp=byId[spouseMap[id]];if(sp)h+="<div class=sec>Spouse</div><span class=lnk onclick=\"goR(\'"+spouseMap[id]+"\');showP(\'"+spouseMap[id]+"\')\">"+(sp.name||"")+"</span>"}
  if(n.links&&n.links.length){h+="<div class=sec>Sources & Links</div><div style=\'display:flex;flex-wrap:wrap;gap:4px\'>";n.links.forEach(function(l){h+="<a href=\'"+l.u+"\' target=\'_blank\' rel=\'noopener\' class=src-link>"+l.t+" \u2197</a>"});h+="</div>"}
  if(n.src==="r"&&!(n.links&&n.links.length))h+="<div class=tag>\u2726 Added through genealogical research</div>";
  document.getElementById("pc").innerHTML=h;
  document.getElementById("pnl").classList.add("open");
}
function closeP(){document.getElementById("pnl").classList.remove("open");document.querySelectorAll(".n").forEach(function(d){d.classList.remove("sel")});document.querySelectorAll(".edge").forEach(function(e){if(e.getAttribute("data-os")){e.setAttribute("stroke",e.getAttribute("data-os"));e.setAttribute("stroke-width",e.getAttribute("data-ow"));e.setAttribute("opacity",e.getAttribute("data-oo"))}e.classList.remove("hi")})}
var scale=1,tx=0,ty=0,dragging=false,lastX=0,lastY=0;
var vp=document.getElementById("vp");
function applyTx(){world.style.transform="translate("+tx+"px,"+ty+"px) scale("+scale+")"}
vp.addEventListener("mousedown",function(e){if(e.target.closest(".n"))return;dragging=true;lastX=e.clientX;lastY=e.clientY;vp.classList.add("drag")});
window.addEventListener("mousemove",function(e){if(!dragging)return;tx+=e.clientX-lastX;ty+=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;applyTx()});
window.addEventListener("mouseup",function(){dragging=false;vp.classList.remove("drag")});
vp.addEventListener("touchstart",function(e){if(e.target.closest(".n"))return;if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY}},{passive:true});
vp.addEventListener("touchmove",function(e){if(!dragging||e.touches.length!==1)return;tx+=e.touches[0].clientX-lastX;ty+=e.touches[0].clientY-lastY;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;applyTx()},{passive:true});
vp.addEventListener("touchend",function(){dragging=false});
vp.addEventListener("wheel",function(e){e.preventDefault();var rect=vp.getBoundingClientRect();var mx=e.clientX-rect.left,my=e.clientY-rect.top;var oldS=scale;scale*=e.deltaY>0?0.92:1.08;scale=Math.max(0.15,Math.min(3,scale));tx=mx-(mx-tx)*(scale/oldS);ty=my-(my-ty)*(scale/oldS);applyTx()},{passive:false});
function zm(s){var rect=vp.getBoundingClientRect();var cx=rect.width/2,cy=rect.height/2;var oldS=scale;scale=s;tx=cx-(cx-tx)*(scale/oldS);ty=cy-(cy-ty)*(scale/oldS);applyTx()}
function goR(id){var p=pos[id];if(!p)return;var rect=vp.getBoundingClientRect();tx=rect.width/2-p.x*scale-NW*scale/2;ty=rect.height/2-p.y*scale-NH*scale/2;applyTx()}
function goX(w){if(w===0&&rootId)goR(rootId);if(w===1){var y=EX.find(function(n){return n.name==="Yves Bouffard"});if(y)goR(y.id)}}
function fitAll(){var rect=vp.getBoundingClientRect();scale=Math.min(rect.width/maxX,rect.height/maxY)*0.9;tx=(rect.width-maxX*scale)/2;ty=(rect.height-maxY*scale)/2;applyTx()}
function doS(q){var sr=document.getElementById("srb");if(!q||q.length<2){sr.classList.remove("v");return}var lq=q.toLowerCase();var m=[];Object.keys(byId).forEach(function(id){if(pos[id]&&(byId[id].name||"").toLowerCase().indexOf(lq)>=0&&m.length<10)m.push(id)});if(!m.length){sr.classList.remove("v");return}sr.innerHTML=m.map(function(id){var n=byId[id];return "<div class=sr onclick=\"goR(\'"+id+"\');showP(\'"+id+"\');document.getElementById(\'srb\').classList.remove(\'v\');document.getElementById(\'q\').value=\'\'\">"+n.name+" <span style=\'color:var(--dm);font-size:0.6rem\'>"+(n.born||"")+"</span></div>"}).join("");sr.classList.add("v")}
document.addEventListener("click",function(e){if(!e.target.closest(".hud .right"))document.getElementById("srb").classList.remove("v")});
setTimeout(function(){var dw=EX.find(function(n){return n.name&&n.name.indexOf("Donat")>=0});if(dw&&pos[dw.id])goR(dw.id);else fitAll()},300);

</script>
